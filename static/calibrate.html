<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Calibration — Robot CV</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-100 flex flex-col">

    <!-- Navbar -->
    <nav class="navbar bg-base-200 border-b border-base-300 px-4">
        <div class="flex-1">
            <a href="/" class="btn btn-ghost btn-sm text-base-content/60">← Dashboard</a>
        </div>
        <div class="flex-none">
            <span class="font-semibold">Board Calibration</span>
        </div>
        <div class="flex-1"></div>
    </nav>

    <!-- Content -->
    <main class="flex-1 flex flex-col items-center gap-4 p-6">

        <p class="text-base-content/60 text-sm">
            Click the 4 corners of the board. Order doesn't matter — the system sorts them automatically.
        </p>

        <canvas id="canvas"
            class="border border-base-300 rounded cursor-crosshair"
            style="max-width: 90vw; max-height: 65vh;">
        </canvas>

        <div class="flex gap-3">
            <button id="reset-btn" class="btn btn-neutral btn-sm">Reset</button>
            <button id="submit-btn" class="btn btn-primary btn-sm" disabled>Submit (0 / 4)</button>
        </div>

        <p id="status" class="text-sm text-base-content/60 min-h-5">Click on the board corners...</p>

        <img id="result-img"
            class="hidden rounded border border-base-300"
            style="max-width: 90vw;"
            alt="Pipeline result">

        <a id="back-link" href="/" class="btn btn-success btn-sm hidden">← Back to Dashboard</a>

    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/calibrate.js"></script>
</body>
</html>
