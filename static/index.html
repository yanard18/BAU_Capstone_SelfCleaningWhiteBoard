<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot CV Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-100 flex flex-col">

    <!-- Navbar -->
    <nav class="navbar bg-base-200 border-b border-base-300 px-4">
        <div class="flex-1">
            <span class="text-lg font-bold tracking-tight">Robot CV Panel</span>
        </div>
        <div class="flex-none flex items-center gap-3">
            <div id="calib-badge" class="badge badge-error gap-1">✗ Not Calibrated</div>
            <a href="/calibrate" class="btn btn-sm btn-outline">Re-calibrate</a>
        </div>
    </nav>

    <!-- Uncalibrated state -->
    <div id="uncalibrated-view" class="hidden flex-1 flex flex-col items-center justify-center gap-6 p-8">
        <div class="alert alert-warning max-w-lg shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <div>
                <h3 class="font-bold">Camera not calibrated</h3>
                <p class="text-sm opacity-80">Calibration is required before the system can process video.</p>
            </div>
        </div>
        <a href="/calibrate" class="btn btn-primary btn-lg">Calibrate Now</a>
    </div>

    <!-- Dashboard state: sidebar + main -->
    <div id="dashboard-view" class="hidden flex-1 flex flex-row overflow-hidden">

        <!-- Config sidebar -->
        <aside class="w-56 bg-base-200 border-r border-base-300 overflow-y-auto flex-shrink-0 flex flex-col gap-5 p-4">

            <div>
                <p class="text-xs font-semibold text-base-content/40 uppercase tracking-wider mb-3">Ink Detection</p>
                <div class="flex flex-col gap-4" data-config-group="ink_detection"></div>
            </div>

            <div class="divider my-0"></div>

            <div>
                <p class="text-xs font-semibold text-base-content/40 uppercase tracking-wider mb-3">Grid & Path</p>
                <div class="flex flex-col gap-4" data-config-group="grid_path"></div>
            </div>

            <div class="divider my-0"></div>

            <div>
                <p class="text-xs font-semibold text-base-content/40 uppercase tracking-wider mb-3">Robot</p>
                <div class="flex flex-col gap-4" data-config-group="robot"></div>
            </div>

            <div class="divider my-0"></div>

            <div>
                <p class="text-xs font-semibold text-base-content/40 uppercase tracking-wider mb-3">Debug Overlays</p>
                <div class="flex flex-col gap-3" data-config-group="debug"></div>
            </div>

        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto flex flex-col gap-4 p-4">

            <!-- Video panels -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

                <div class="card bg-base-200 shadow">
                    <div class="card-body p-4 gap-3">
                        <div class="flex items-center justify-between">
                            <h2 class="font-semibold text-sm">Raw Input</h2>
                            <div class="badge badge-success badge-sm">● Live</div>
                        </div>
                        <div class="aspect-video bg-base-300 rounded overflow-hidden flex items-center justify-center">
                            <img id="live-feed" class="w-full h-full object-contain" src="" alt="Raw input">
                        </div>
                    </div>
                </div>

                <div class="card bg-base-200 shadow">
                    <div class="card-body p-4 gap-3">
                        <div class="flex items-center justify-between">
                            <div role="tablist" class="tabs tabs-boxed tabs-xs">
                                <button role="tab" class="tab tab-active" data-view="output">Output</button>
                                <button role="tab" class="tab" data-view="gray">Grayscale</button>
                                <button role="tab" class="tab" data-view="ink_mask">Ink Mask</button>
                            </div>
                            <div class="badge badge-success badge-sm">● Live</div>
                        </div>
                        <div class="aspect-video bg-base-300 rounded overflow-hidden flex items-center justify-center">
                            <img id="right-feed" class="w-full h-full object-contain" src="" alt="Processed view">
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
